app = "bloomit-dev"
primary_region = "iad"

[build]

[env]
  NEXT_PUBLIC_API_URL = "https://api.bloomit.ai"
  NEXT_PUBLIC_APP_URL = "https://dev.bloomit.ai"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
